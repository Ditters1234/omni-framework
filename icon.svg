<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- DEFINITIONS -->
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <!-- Glow ONLY for main ring -->
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <circle cx="100" cy="100" r="92" fill="#0b1220"/>

  <!-- MODULAR OUTER SEGMENTS (attachment points) -->
  <g fill="#22d3ee">
    <rect x="96" y="6" width="8" height="14" rx="2"/>
    <rect x="180" y="96" width="14" height="8" rx="2"/>
    <rect x="96" y="180" width="8" height="14" rx="2"/>
    <rect x="6" y="96" width="14" height="8" rx="2"/>
  </g>

  <!-- OUTER DASH RING -->
  <circle cx="100" cy="100" r="90"
    fill="none"
    stroke="#22d3ee"
    stroke-width="1.2"
    stroke-dasharray="6 4"
    opacity="0.35"/>

  <!-- MAIN RING (ONLY GLOW HERE) -->
  <circle cx="100" cy="100" r="82"
    fill="none"
    stroke="url(#ringGrad)"
    stroke-width="3"
    filter="url(#ringGlow)"/>

    <!-- SEGMENTED SYSTEM RING -->
    <circle cx="100" cy="100" r="68"
      fill="none"
      stroke="#22d3ee"
      stroke-width="3"
      stroke-dasharray="36 10 10 10"
      opacity="0.85">
    
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 100 100"
        to="360 100 100"
        dur="8s"
        repeatCount="indefinite"
      />

    </circle>

  <!-- INNER DISC -->
  <circle cx="100" cy="100" r="58" fill="#020617"/>

  <!-- PANEL / STRUCTURE LINES -->
  <g stroke="#22d3ee" stroke-width="1" opacity="0.18">
    <circle cx="100" cy="100" r="48" fill="none"/>
    <line x1="65" y1="100" x2="135" y2="100"/>
    <line x1="100" y1="65" x2="100" y2="135"/>
  </g>

  <!-- DATA FLOW LINES -->
  <g stroke="#22d3ee" stroke-width="1.2" opacity="0.6">
    <line x1="100" y1="40" x2="102" y2="78"/>
    <line x1="160" y1="100" x2="122" y2="102"/>
    <line x1="100" y1="160" x2="98" y2="122"/>
    <line x1="40" y1="100" x2="78" y2="98"/>
  </g>

  <!-- CORE GLOW -->
  <circle cx="100" cy="100" r="18" fill="url(#coreGlow)" />

  <!-- CORE FRAME (outer layer) -->
  <rect x="78" y="78" width="44" height="44" rx="4"
    fill="none"
    stroke="#334155"
    stroke-width="2"/>

  <!-- CORE FRAME (inner layer) -->
  <rect x="84" y="84" width="32" height="32" rx="3"
    fill="none"
    stroke="#22d3ee"
    stroke-width="2"/>

  <!-- CORE BLOCK -->
  <rect x="90" y="90" width="20" height="20" rx="2"
    fill="#0ea5e9"
    stroke="#22d3ee"
    stroke-width="1"/>

  <!-- SYSTEM NODES -->
  <g fill="#cbd5f5">
    <circle cx="100" cy="60" r="2"/>
    <circle cx="140" cy="100" r="2"/>
    <circle cx="100" cy="140" r="2"/>
    <circle cx="60" cy="100" r="2"/>
  </g>

</svg>